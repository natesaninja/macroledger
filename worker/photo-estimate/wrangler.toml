name = "macroledger-photo-estimate"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Free tier defaults — override in dashboard if needed
[vars]
# Prefer Workers AI (no user keys). Optional Gemini fallback if GEMINI_API_KEY secret is set.
WORKERS_AI_MODEL = "@cf/llava-hf/llava-1.5-7b-hf"
GEMINI_MODEL = "gemini-2.5-flash-lite"
PER_IP_DAILY = "5"
GLOBAL_DAILY = "400"

# Built-in free inference — no API keys required for end users
[ai]
binding = "AI"

# Optional secret (only if you want Gemini as fallback):
#   npx wrangler secret put GEMINI_API_KEY
